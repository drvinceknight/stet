site_name: once
theme:
  name: material
  logo: img/logo.svg
  favicon: img/logo.svg
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.tabs.link

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true

nav:
  - Home: index.md
  - Tutorials:
    - Getting Started: tutorials/getting-started.md
  - How-To Guides:
    - Install: how-to/install.md
    - Decorate a Function: how-to/decorate-a-function.md
    - Specify a Store: how-to/specify-a-store.md
    - Choose Key Parameters: how-to/choose-key-parameters.md
    - Inspect a Store: how-to/inspect-and-reset-a-store.md
    - Re-run a Specific Experiment: how-to/handle-reruns.md
    - Re-run Everything: how-to/rerun-everything.md
    - Resume a Sweep: how-to/recover-from-a-crash.md
    - Choose a Backend: how-to/choose-a-backend.md
    - Use with Multiprocessing: how-to/use-with-multiprocessing.md
    - Import Existing Results: how-to/import-existing-results.md
  - Reference:
    - API: reference/api.md
  - Explanation:
    - How once Works: explanation/how-once-works.md
    - Related Libraries: explanation/related-libraries.md
    - Performance: explanation/performance.md
